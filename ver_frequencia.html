<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Ver Frequência por Mês</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .tabela-frequencia {
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>
<body class="p-4">
  <h2 class="mb-2">Frequência dos Alunos</h2>
  <button id="btnVoltar" class="btn btn-outline-secondary mb-3">← Voltar ao Dashboard</button>

  <div class="mb-3 d-flex align-items-end gap-2">
    <div class="flex-grow-1">
      <label for="filtroOficina" class="form-label">Selecione a Oficina:</label>
      <select id="filtroOficina" class="form-select" required>
        <option value="" disabled selected>Escolha uma oficina</option>
      </select>
    </div>
    <button id="btnCarregar" class="btn btn-primary">Carregar Frequências</button>
  </div>

  <div id="areaFrequencia" class="d-flex" style="display: none;">
    <div id="listaAlunos" class="list-group me-4" style="width: 280px; height: 500px; overflow-y: auto;"></div>

    <div id="painelAluno" class="card p-4 flex-grow-1 shadow-sm">
      <h4 class="mb-3">Informações do Aluno</h4>
      <p><strong>Nome:</strong> <span id="nomeAluno">-</span></p>
      <p><strong>Matrícula:</strong> <span id="matriculaAluno">-</span></p>
      <p><strong>Oficina:</strong> <span id="oficinaAluno">-</span></p>
      <p>
        <strong>Frequência:</strong> <span id="frequenciaAluno">-</span>
        <button class="btn btn-outline-info btn-sm ms-2" id="btnDetalhar">🛈</button>
      </p>

      <div id="tabelaDetalhes" class="mt-4" style="display: none;">
        <h6 class="mb-2">Detalhamento das Aulas</h6>
        <div class="tabela-frequencia">
          <table class="table table-bordered">
            <thead class="table-light">
              <tr>
                <th>Data</th>
                <th>Status</th>
                <th>Anexo</th>
              </tr>
            </thead>
            <tbody id="tabelaFrequencia"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/ver_frequencia.js"></script>

  <script>
    document.getElementById("btnVoltar").addEventListener("click", () => {
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
