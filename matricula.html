<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrícula de Aluno</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container my-5">

    <!-- Título + Botão Voltar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">Matrícula de Aluno</h2>
      <a id="btnVoltar" class="btn btn-secondary">← Voltar ao Dashboard</a>
    </div>

    <form id="formMatricula">
      <div class="row g-3">
        <!-- Dados do Aluno -->
        <div class="col-md-6">
          <label for="nome" class="form-label">Nome do Aluno</label>
          <input type="text" id="nome" class="form-control" required />
        </div>

        <div class="col-md-6">
          <label for="nascimento" class="form-label">Faixa Etária</label>
          <select id="nascimento" class="form-select" required>
            <option value="">Selecione...</option>
            <option value="08 a 10 anos">08 a 10 anos</option>
            <option value="11 a 13 anos">11 a 13 anos</option>
            <option value="14 anos ou mais">14 anos ou mais</option>
          </select>
        </div>

        <div class="col-md-6">
          <label for="cpf" class="form-label">CPF do Aluno</label>
          <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" required />
        </div>

        <div class="col-md-6">
          <label for="fotoAluno" class="form-label">Foto do Aluno</label>
          <input type="file" id="fotoAluno" accept="image/*" class="form-control" />
        </div>

        <div class="col-md-6">
          <label for="escola" class="form-label">Escola</label>
          <select id="escola" class="form-select" required></select>
        </div>

        <div class="col-md-6">
          <label for="turma" class="form-label">Turma</label>
          <select id="turma" class="form-select" required></select>
        </div>

        <!-- Dados do Responsável -->
        <hr class="mt-4">
        <h5>Responsável</h5>

        <div class="col-md-6">
          <label for="respNome" class="form-label">Nome</label>
          <input type="text" id="respNome" class="form-control" required />
        </div>

        <div class="col-md-6">
          <label for="respTelefone" class="form-label">Telefone</label>
          <input type="text" id="respTelefone" class="form-control" required />
        </div>

        <div class="col-md-6">
          <label for="respEmail" class="form-label">E-mail</label>
          <input type="email" id="respEmail" class="form-control" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary mt-4">Salvar Matrícula</button>
      <div id="sucesso" class="alert alert-success mt-3 d-none">Aluno matriculado com sucesso!</div>
    </form>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/matricula.js"></script>

  <!-- Botão voltar dinâmico -->
  <script>
    firebase.auth().onAuthStateChanged(user => {
      const btn = document.getElementById("btnVoltar");
      if (user && user.email.includes("@diretor")) {
        btn.href = "diretor.html";
      } else {
        btn.href = "dashboard.html";
      }
    });
  </script>
</body>
</html>
