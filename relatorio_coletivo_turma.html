<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatórios Mensais por Turma</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    h2, label {
      color: #3f2723;
    }

    .btn-madein {
      background-color: #1b4b5f;
      color: white;
      border: none;
    }

    .btn-madein:hover {
      background-color: #4583c4;
    }

    .table-primary {
      background-color: #4583c4 !important;
      color: white;
    }

    td[contenteditable="true"] {
      background-color: #fff8dc;
    }

    .btn-acao {
      display: block;
      margin-bottom: 6px;
      width: 100%;
    }

    textarea {
      resize: vertical;
    }

    .btn-voltar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Botão de voltar fixado no topo -->
  <a href="diretor.html" class="btn btn-light btn-voltar">← Voltar ao Dashboard</a>

  <div class="container my-5">
    <h2 class="mb-4 text-center">Relatórios Mensais por Turma</h2>

    <div class="table-responsive">
      <table class="table table-bordered align-middle">
        <thead class="table-primary">
          <tr>
            <th>Turma</th>
            <th>Data</th>
            <th>Atividades</th>
            <th>Observações</th>
            <th style="min-width: 160px;">Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaRelatorios"></tbody>
      </table>
    </div>
  </div>

  <!-- Firebase + Script -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/relatorio_coletivo_turma.js"></script>

</body>
</html>
