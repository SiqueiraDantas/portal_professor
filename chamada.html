<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Chamada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .foto-aluno {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 50%;
      margin-right: 10px;
      border: 2px solid #1b4b5f;
    }
    .aluno-info {
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container my-5">

    <!-- Título + Botão Voltar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">Registro de Chamada</h2>
      <a id="btnVoltar" class="btn btn-secondary">← Voltar ao Dashboard</a>
    </div>

    <!-- Alerta de Sucesso ou Erro -->
    <div id="msgSucesso" class="alert d-none mt-3"></div>

    <!-- Filtros -->
    <form id="formFiltro" class="row g-3 mb-4">
      <div class="col-md-6">
        <label class="form-label">Turma</label>
        <select id="turmaFiltro" class="form-select" required>
          <option value="">Selecione uma turma</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Data</label>
        <input type="date" id="dataFiltro" class="form-control" required>
      </div>

      <div class="col-md-12">
        <button type="submit" class="btn btn-primary">Carregar Alunos</button>
      </div>
    </form>

    <!-- Tabela de alunos -->
    <form id="formChamada" class="d-none">
      <div class="table-responsive">
        <table class="table table-bordered align-middle">
          <thead class="table-primary">
            <tr>
              <th>Aluno</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tabelaChamada">
            <!-- Preenchido via JS -->
          </tbody>
        </table>
      </div>

      <button type="submit" class="btn btn-success mt-3">Salvar Chamada</button>
    </form>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/chamada.js"></script>

  <!-- Redirecionamento dinâmico do botão voltar -->
  <script>
    firebase.auth().onAuthStateChanged(user => {
      const btn = document.getElementById("btnVoltar");
      if (user && user.email.includes("@diretor")) {
        btn.href = "diretor.html";
      } else {
        btn.href = "dashboard.html";
      }
    });
  </script>
</body>
</html>
