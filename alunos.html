<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alunos Matriculados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    @media print {
      .no-print {
        display: none !important;
      }

      .table-responsive {
        overflow: visible !important;
      }

      table {
        display: block;
        margin: 0 auto !important;
        width: auto !important;
        min-width: 90%;
      }

      th, td {
        white-space: normal !important;
      }

      body {
        background-color: white !important;
      }

      .print-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #ccc;
      }

      .print-header img {
        max-height: 70px;
      }

      .print-header .data {
        font-size: 14px;
        color: #333;
      }

      .print-title {
        text-align: center;
        margin-bottom: 20px;
      }
    }

    .table-active td {
      background-color: #e7f1ff !important;
    }

    .checkbox-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container my-5">
    <!-- Botão Voltar -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0">Alunos Matriculados</h2>
      <a href="dashboard.html" class="btn btn-secondary no-print">← Voltar ao Dashboard</a>
    </div>

    <!-- Cabeçalho de impressão -->
    <div class="print-header d-none d-print-flex">
      <img src="img/logo_colorida.png" alt="Logo Made In Sertão" />
      <div class="data">Data da impressão: <span id="dataImpressao"></span></div>
    </div>

    <!-- Título centralizado na impressão -->
    <div class="print-title d-none d-print-block">
      <h3>Alunos Matriculados</h3>
    </div>

    <!-- Ações -->
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-dark no-print" onclick="window.print()">Imprimir</button>
      <button id="btnEditar" class="btn btn-primary no-print" disabled>Editar</button>
      <button id="btnExcluir" class="btn btn-danger no-print" disabled>Excluir</button>
    </div>

    <!-- Tabela -->
    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead class="table-primary">
          <tr>
            <th>
              <label class="checkbox-header">
                <input type="checkbox" id="selectAll" />
                <span>Selecionar todos</span>
              </label>
            </th>
            <th>Matrícula</th>
            <th>Nome</th>
            <th>Turma</th>
            <th>Nascimento</th>
            <th>Responsável</th>
            <th>Telefone</th>
            <th>E-mail</th>
          </tr>
        </thead>
        <tbody id="tabelaAlunos">
          <!-- Conteúdo via JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/alunos.js"></script>

  <!-- Proteção contra botão direito em imagens -->
  <script>
    document.querySelectorAll("img").forEach(img => {
      img.setAttribute("draggable", "false");
      img.addEventListener("contextmenu", e => e.preventDefault());
    });
  </script>
</body>
</html>
